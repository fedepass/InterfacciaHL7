<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmacia HL7 - Cappe</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <nav>
    <div class="nav-brand">Farmacia HL7</div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/cappe.html" class="active">Cappe</a>
      <a href="/filtri.html">Filtri</a>
      <a href="/config.html">Configurazione</a>
      <a href="/output.html">Campi Output</a>
    </div>
  </nav>

  <main>
    <h1>Gestione Cappe</h1>

    <section class="panel">
      <div class="panel-header">
        <h2>Aggiungi Cappa</h2>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2;min-width:200px">
          <label>Nome</label>
          <input type="text" id="new-name" placeholder="es. Cappa Chemioterapici">
        </div>
        <div class="form-group" style="min-width:200px">
          <label>Tipologia</label>
          <select id="new-type">
            <option value="FLUSSO_LAMINARE_VERTICALE">Flusso laminare verticale</option>
            <option value="FLUSSO_LAMINARE_ORIZZONTALE">Flusso laminare orizzontale</option>
            <option value="ISOLATORE">Isolatore</option>
            <option value="BSC">Cappa biologica (BSC)</option>
            <option value="CHIMICA">Cappa chimica</option>
            <option value="DISPENSAZIONE">Postazione dispensazione</option>
            <option value="ALTRO" selected>Altro</option>
          </select>
        </div>
        <div class="form-group" style="min-width:120px;max-width:140px">
          <label>Max coda (0 = ∞)</label>
          <input type="number" id="new-maxqueue" min="0" value="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Descrizione</label>
          <input type="text" id="new-desc" placeholder="Note o descrizione opzionale">
        </div>
        <div class="form-group" style="flex:2">
          <label>Specializzazioni (separate da virgola)</label>
          <input type="text" id="new-specs" placeholder="es. CHEMOTHERAPY,ANTIBIOTIC">
        </div>
        <button onclick="createCappa()" class="btn-primary" style="align-self:flex-end;white-space:nowrap">Aggiungi</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Cappe Configurate</h2>
        <button onclick="loadCappeList()">Aggiorna</button>
      </div>
      <div id="cappe-list" class="cappe-list">
        <div class="loading">Caricamento...</div>
      </div>
    </section>
  </main>

  <!-- Modal modifica -->
  <div id="modal" class="modal hidden">
    <div class="modal-content modal-content-wide">
      <h3>Modifica Cappa</h3>
      <input type="hidden" id="edit-id">

      <label>Nome</label>
      <input type="text" id="edit-name">

      <label>Tipologia</label>
      <select id="edit-type">
        <option value="FLUSSO_LAMINARE_VERTICALE">Flusso laminare verticale</option>
        <option value="FLUSSO_LAMINARE_ORIZZONTALE">Flusso laminare orizzontale</option>
        <option value="ISOLATORE">Isolatore</option>
        <option value="BSC">Cappa biologica (BSC)</option>
        <option value="CHIMICA">Cappa chimica</option>
        <option value="DISPENSAZIONE">Postazione dispensazione</option>
        <option value="ALTRO">Altro</option>
      </select>

      <label>Descrizione</label>
      <input type="text" id="edit-desc" placeholder="Note o descrizione opzionale">

      <label>Specializzazioni (separate da virgola)</label>
      <input type="text" id="edit-specs">

      <label>Stato operativo</label>
      <select id="edit-status">
        <option value="ONLINE">Online — operativa e disponibile</option>
        <option value="OFFLINE">Offline — temporaneamente non disponibile</option>
        <option value="MANUTENZIONE">Manutenzione — in manutenzione programmata</option>
        <option value="GUASTO">Guasto — fuori servizio</option>
      </select>

      <label>Capacità massima coda (0 = illimitata)</label>
      <input type="number" id="edit-maxqueue" min="0">

      <div class="modal-buttons">
        <button onclick="saveEdit()" class="btn-primary">Salva</button>
        <button onclick="closeModal()">Annulla</button>
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
  <script>loadCappeList();</script>
</body>
</html>
